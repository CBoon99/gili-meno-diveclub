backend:
  name: git-gateway
  branch: main

site_url: https://menodiveclub.com
display_url: https://menodiveclub.com
logo_url: https://menodiveclub.com/favicon.svg

media_folder: 'public/assets/uploads'
public_folder: '/assets/uploads'

publish_mode: editorial_workflow

# i18n: stores English at root, French inside .fr.* siblings.
# Decap will surface both in a single editor screen.
i18n:
  structure: multiple_files
  locales: [en, fr]
  default_locale: en

collections:
  - name: 'courses'
    label: 'Courses'
    folder: 'src/content/courses'
    create: true
    slug: '{{slug}}'
    i18n: true
    fields:
      - { label: 'Title', name: 'title', widget: 'string', i18n: true }
      - { label: 'Slug', name: 'slug', widget: 'string', hint: 'URL slug (kebab-case)' }
      - { label: 'Type', name: 'type', widget: 'select', options: ['BEGINNER', 'INTERMEDIATE', 'ADVANCED', 'ECO', 'PACKAGE'] }
      - { label: 'Price (IDR)', name: 'price', widget: 'number', required: false }
      - { label: 'Duration (days)', name: 'duration', widget: 'number', required: false }
      - { label: 'Hero image', name: 'image', widget: 'image', required: false }
      - { label: 'Summary', name: 'summary', widget: 'text', i18n: true }
      - { label: 'Body', name: 'body', widget: 'markdown', i18n: true }
      - label: 'SEO'
        name: 'seo'
        widget: 'object'
        i18n: true
        fields:
          - { label: 'Title', name: 'title', widget: 'string', required: false }
          - { label: 'Description', name: 'description', widget: 'string', required: false }

  - name: 'blog'
    label: 'Bubble Diaries (Blog)'
    folder: 'src/content/blog'
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    i18n: true
    fields:
      - { label: 'Title', name: 'title', widget: 'string', i18n: true }
      - { label: 'Author', name: 'author', widget: 'string' }
      - { label: 'Date', name: 'date', widget: 'datetime' }
      - { label: 'Hero image', name: 'image', widget: 'image', required: false }
      - { label: 'Summary', name: 'summary', widget: 'text', i18n: true }
      - { label: 'Body', name: 'body', widget: 'markdown', i18n: true }
      - { label: 'Tags', name: 'tags', widget: 'list', required: false }

  - name: 'dive-sites'
    label: 'Dive Sites'
    folder: 'src/content/dive-sites'
    create: true
    slug: '{{slug}}'
    i18n: true
    fields:
      - { label: 'Name', name: 'name', widget: 'string', i18n: true }
      - { label: 'Slug', name: 'slug', widget: 'string' }
      - { label: 'Max depth (m)', name: 'maxDepth', widget: 'number' }
      - { label: 'Difficulty', name: 'difficulty', widget: 'select', options: ['BEGINNER', 'INTERMEDIATE', 'ADVANCED'] }
      - { label: 'Latitude', name: 'lat', widget: 'number', value_type: 'float' }
      - { label: 'Longitude', name: 'lng', widget: 'number', value_type: 'float' }
      - { label: 'Hero image', name: 'image', widget: 'image', required: false }
      - { label: 'Description', name: 'description', widget: 'markdown', i18n: true }

  - name: 'testimonials'
    label: 'Testimonials'
    folder: 'src/content/testimonials'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: 'Name', name: 'name', widget: 'string' }
      - { label: 'Source', name: 'source', widget: 'select', options: ['Google', 'TripAdvisor', 'Email', 'Other'] }
      - { label: 'Rating', name: 'rating', widget: 'number', min: 1, max: 5, default: 5 }
      - { label: 'Review', name: 'review', widget: 'text' }
      - { label: 'Date', name: 'date', widget: 'datetime', required: false }

  - name: 'settings'
    label: 'Settings'
    files:
      - name: 'general'
        label: 'General'
        file: 'src/content/settings/general.json'
        fields:
          - { label: 'Hero headline (EN)', name: 'heroEn', widget: 'string' }
          - { label: 'Hero headline (FR)', name: 'heroFr', widget: 'string' }
          - { label: 'Phone', name: 'phone', widget: 'string' }
          - { label: 'Email', name: 'email', widget: 'string' }
