<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Meno Dive Club · CMS</title>
  </head>
  <body>
    <!-- Decap CMS UI loaded from CDN (kept as a separate document, not part of the Astro bundle). -->
    <script src="https://unpkg.com/decap-cms@^3.8.4/dist/decap-cms.js"></script>
    <!-- Netlify Identity widget hook for Git Gateway login. -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', (user) => {
          if (!user) {
            window.netlifyIdentity.on('login', () => {
              document.location.href = '/admin/'
            })
          }
        })
      }
    </script>
  </body>
</html>
